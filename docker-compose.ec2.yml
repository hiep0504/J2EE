services:
  backend:
    image: ${DOCKERHUB_USERNAME}/j2ee-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/uploads
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ${DOCKERHUB_USERNAME}/j2ee-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  backend_uploads:
