spring.application.name=Backend_J2EE

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/j2ee_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=ha912004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Khong chay lai data.sql moi lan start de tranh duplicate du lieu
spring.sql.init.mode=never
spring.sql.init.continue-on-error=false

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=uploads

# Google OAuth (set from environment variable)
app.google.client-id=${GOOGLE_CLIENT_ID:}

