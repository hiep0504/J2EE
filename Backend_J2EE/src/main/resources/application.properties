spring.application.name=Backend_J2EE
spring.config.import=optional:file:.env[.properties]
# MySQL Database Configuration

spring.datasource.url=${MYSQL_URL:${DB_URL:jdbc:mysql://localhost:3306/j2ee_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}}
spring.datasource.username=${MYSQL_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=${MYSQL_PASSWORD:${DB_PASSWORD:}}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Load seed data on startup. INSERT IGNORE keeps the script idempotent.
spring.sql.init.mode=never
spring.sql.init.continue-on-error=false

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=uploads
app.aws.region=${AWS_REGION:ap-southeast-1}
app.aws.bucket-name=${AWS_BUCKET_NAME:}
app.aws.access-key=${AWS_ACCESS_KEY:}
app.aws.secret-key=${AWS_SECRET_KEY:}

# Google OAuth (set from environment variable)
app.google.client-id=${GOOGLE_CLIENT_ID:}

# Gmail password reset mail configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Chat realtime
app.chat.timeout-seconds=180
app.chat.super-admin-usernames=

# RAG chatbot + vector DB
app.rag.retrieval.top-k=${APP_RAG_RETRIEVAL_TOP_K:5}
app.rag.retrieval.min-score=${APP_RAG_RETRIEVAL_MIN_SCORE:0.20}
app.rag.provider=${APP_RAG_PROVIDER:openai}
app.rag.embedding.model=${APP_RAG_EMBEDDING_MODEL:text-embedding-3-small}
app.rag.embedding.fallback-dimensions=${APP_RAG_EMBEDDING_FALLBACK_DIMENSIONS:256}
app.rag.chat.model=${APP_RAG_CHAT_MODEL:gpt-4o-mini}
app.rag.chat.context-window-turns=8
app.rag.chat.context-window-max-history-chars=6000
app.rag.base-url=${APP_RAG_BASE_URL:https://api.openai.com/v1}
app.rag.api-key=${APP_RAG_API_KEY:}
app.rag.index.rebuild-on-startup=true
app.rag.index.scheduled-enabled=true
app.rag.index.rebuild-interval-ms=1800000

