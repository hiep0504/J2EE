spring.application.name=Backend_J2EE

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/j2ee_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=ha912004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Chạy data.sql khi start (bỏ qua nếu DB đã có data - sẽ bị lỗi duplicate)
spring.sql.init.mode=always
